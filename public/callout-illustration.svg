<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" fill="none">
  <!-- Background panel -->
  <rect x="20" y="20" width="260" height="160" rx="12" fill="#F1F8F5"/>

  <!-- Chart bars -->
  <rect x="50" y="110" width="28" height="50" rx="4" fill="#00A47C"/>
  <rect x="90" y="90" width="28" height="70" rx="4" fill="#00A47C" opacity="0.8"/>
  <rect x="130" y="70" width="28" height="90" rx="4" fill="#00A47C" opacity="0.6"/>
  <rect x="170" y="50" width="28" height="110" rx="4" fill="#00A47C" opacity="0.4"/>

  <!-- Trend line -->
  <polyline points="64,110 104,90 144,70 184,50" stroke="#005E45" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Dots on trend -->
  <circle cx="64" cy="110" r="4" fill="#005E45"/>
  <circle cx="104" cy="90" r="4" fill="#005E45"/>
  <circle cx="144" cy="70" r="4" fill="#005E45"/>
  <circle cx="184" cy="50" r="4" fill="#005E45"/>

  <!-- Badge / checkmark circle -->
  <circle cx="230" cy="80" r="28" fill="#FFFFFF" stroke="#00A47C" stroke-width="2"/>
  <polyline points="218,80 226,88 242,72" stroke="#00A47C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom label bar -->
  <rect x="50" y="168" width="80" height="8" rx="4" fill="#B2DFD0"/>
  <rect x="145" y="168" width="50" height="8" rx="4" fill="#B2DFD0"/>
</svg>
